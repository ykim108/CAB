<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAB-3D | Glass Water</title>
    <style>
        body { margin: 0; background-color: #151520; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #canvas-container { width: 80vw; height: 75vh; background-color: #ffffff; border: 1px solid #000; position: relative; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 10000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- 🌊 THE NEW "TRUE GLASS" WATER ---
        const textureLoader = new THREE.TextureLoader();
        const waterNormalMap = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/water/waternormals.jpg');
        waterNormalMap.wrapS = waterNormalMap.wrapT = THREE.RepeatWrapping;
        // Make the waves larger across the giant plane
        waterNormalMap.repeat.set(50, 50); 

        const waterGeo = new THREE.PlaneGeometry(1000, 1000);
        const waterMat = new THREE.MeshPhysicalMaterial({
            color: 0x001e3d,         // Deep Midnight Blue
            metalness: 0.1,          // Low metalness so it isn't a solid mirror
            roughness: 0.1,          // Smooth surface
            transmission: 0.85,      // THIS MAKES IT TRANSPARENT (85% see-through)
            transparent: true,
            opacity: 1.0,            // Opacity must be 1.0 when using transmission
            normalMap: waterNormalMap,
            normalScale: new THREE.Vector2(2.0, 2.0), // The height of the waves
            side: THREE.DoubleSide
        });
        
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        const loader = new GLTFLoader();
        // Updated to ?v=8
        loader.load('./3js.glb?v=8', (gltf) => {
            const model = gltf.scene;
            
            let box = new THREE.Box3().setFromObject(model);
            let size = box.getSize(new THREE.Vector3());
            
            const maxOriginalDim = Math.max(size.x, size.y, size.z);
            const scaleFactor = 20 / maxOriginalDim;
            model.scale.set(scaleFactor, scaleFactor, scaleFactor);

            box.setFromObject(model);
            size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            model.position.sub(center); 
            scene.add(model);

            const bottomOfModel = -(size.y / 2);
            water.position.y = bottomOfModel + (size.y * 0.50); 

            camera.position.set(30, 20, 30);
            camera.lookAt(0, 0, 0);
        });

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;

        function animate() {
            requestAnimationFrame(animate);
            
            // This is how we animate the new glass water
            waterNormalMap.offset.x -= 0.001;
            waterNormalMap.offset.y += 0.001;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
