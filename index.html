<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAB-3D | Concrete & Deep Water</title>
    <style>
        body { margin: 0; background-color: #151520; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #canvas-container { width: 80vw; height: 75vh; background-color: #ffffff; border: 1px solid #000; position: relative; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Water } from 'three/addons/objects/Water.js';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 10000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const textureLoader = new THREE.TextureLoader();
        
        // --- 🌊 WATER SETUP ---
        const waterNormalMap = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/water/waternormals.jpg');
        waterNormalMap.wrapS = waterNormalMap.wrapT = THREE.RepeatWrapping;

        const water = new Water(new THREE.PlaneGeometry(1000, 1000), {
            textureWidth: 512,
            textureHeight: 512,
            waterNormals: waterNormalMap,
            sunDirection: new THREE.Vector3().copy(dirLight.position).normalize(),
            sunColor: 0xffffff,
            waterColor: 0x004488,
            distortionScale: 30.0, 
            size: 3.0,
            alpha: 0.65
        });
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        // --- 🧱 CONCRETE TEXTURE SETUP ---
        // Using a generic gritty noise map to simulate concrete aggregate
        const concreteTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/roughness_map.jpg');
        concreteTexture.wrapS = concreteTexture.wrapT = THREE.RepeatWrapping;
        concreteTexture.repeat.set(3, 3); // Makes the grain smaller/larger

        // Create the concrete material
        const concreteMaterial = new THREE.MeshStandardMaterial({
            color: 0x999999,         // Base architectural gray
            map: concreteTexture,    // The gritty image
            roughness: 0.9,          // Concrete is very matte/rough
            metalness: 0.1           // Concrete is not shiny
        });

        const loader = new GLTFLoader();
        loader.load('./3js.glb?v=6', (gltf) => {
            const model = gltf.scene;
            
            // --- 🎨 APPLY CONCRETE TO EVERYTHING ---
            model.traverse((child) => {
                if (child.isMesh) {
                    child.material = concreteMaterial; // Override original material
                }
            });

            let box = new THREE.Box3().setFromObject(model);
            let size = box.getSize(new THREE.Vector3());
            
            const maxOriginalDim = Math.max(size.x, size.y, size.z);
            const scaleFactor = 20 / maxOriginalDim;
            model.scale.set(scaleFactor, scaleFactor, scaleFactor);

            box.setFromObject(model);
            size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            model.position.sub(center); 
            scene.add(model);

            const bottomOfModel = -(size.y / 2);
            water.position.y = bottomOfModel + (size.y * 0.50); 

            camera.position.set(30, 20, 30);
            camera.lookAt(0, 0, 0);
        });

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;

        function animate() {
            requestAnimationFrame(animate);
            water.material.uniforms[ 'time' ].value += 4.0 / 60.0;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
